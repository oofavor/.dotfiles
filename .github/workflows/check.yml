name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Evaluate nyaa config
        run: nix eval .#nixosConfigurations.nyaa.config.system.build.toplevel.outPath
      - name: Evaluate wawa config
        run: nix eval .#nixosConfigurations.wawa.config.system.build.toplevel.outPath
